<section id="contact" class="section section--frosted reveal" aria-labelledby="contact-title">
  <div class="section-divider" aria-hidden="true"></div>
  <div class="shell contact__inner">
    <header class="section__header">
      <h2 id="contact-title">[Contact section heading]</h2>
      <p class="section__lede">
        [Contact section body text placeholder. Invite visitors to get in touch and describe how you can help them.]
      </p>
    </header>
    <div class="section__content contact__content">
      <form class="contact__form" action="#" method="post" novalidate>
        <div class="form-field">
          <input id="contact-name" name="name" type="text" autocomplete="name" required placeholder=" " />
          <label for="contact-name">[Name label]</label>
        </div>
        <div class="form-field">
          <input id="contact-email" name="email" type="email" autocomplete="email" required placeholder=" " />
          <label for="contact-email">[Email label]</label>
        </div>
        <div class="form-field">
          <input id="contact-organisation" name="organisation" type="text" autocomplete="organization" placeholder=" " />
          <label for="contact-organisation">[Organisation label]</label>
        </div>
        <div class="form-field">
          <textarea id="contact-message" name="message" rows="4" required placeholder=" "></textarea>
          <label for="contact-message">[Message label]</label>
        </div>
        <button class="button" type="submit">[Submit button]</button>
        <p class="contact__status" data-form-status role="status" aria-live="polite"></p>
      </form>
      <div class="contact__strip">
        <div class="contact__strip-item">
          <strong>[Email label]</strong>
          <a href="mailto:hello@yourcompany.co.uk">[email@placeholder.com]</a>
        </div>
        <div class="contact__strip-item">
          <strong>[Phone label]</strong>
          <a href="tel:+441234567890">[00000 000 000]</a>
        </div>
        <div class="contact__strip-item">
          <strong>[Location label]</strong>
          <span>[Location placeholder]</span>
        </div>
        <div class="contact__strip-item">
          <strong>[Office hours label]</strong>
          <span>[Office hours placeholder]</span>
        </div>
      </div>
    </div>
  </div>
</section>
